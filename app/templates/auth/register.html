<div class="auth-card popup-card">

  <!-- Logo / Header -->
  <div class="auth-header">
    <div class="auth-logo">
      <span class="logo-icon">H</span>
    </div>
    <h2 class="auth-title">Sign Up</h2>
    <p class="auth-sub">Create your HireNext account</p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- Form -->
  <form method="POST" action="/auth/register" class="auth-form">

    <!-- Name -->
    <div class="form-group">
      <label>Full Name</label>
      <input 
        type="text" 
        name="name" 
        required 
        placeholder="Enter your full name"
        value="{{ name or '' }}"
      />
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email Address</label>
      <input 
        type="email" 
        name="email" 
        required 
        placeholder="Enter your email"
        value="{{ email or '' }}"
      />
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <div class="pw-row">
        <input 
          type="password" 
          name="password" 
          id="registerPassword"
          required 
          minlength="8"
          placeholder="At least 8 characters"
        />
        <button type="button" class="pw-toggle" data-target="registerPassword">
          Show
        </button>
      </div>
      <div class="auth-hint">Password must be at least 8 characters.</div>
    </div>

    <!-- Terms -->
    <div class="auth-options">
      <label class="remember-me">
        <input type="checkbox" required>
        <span>I agree to the <a href="#" class="inline-link">Terms</a> and <a href="#" class="inline-link">Privacy Policy</a></span>
      </label>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn">
      Create Account
    </button>

  </form>

  <!-- Switch -->
  <div class="auth-switch">
    Already have an account?
    <a href="#" class="switch-link" data-auth="login">
      Sign In
    </a>
  </div>

</div>
